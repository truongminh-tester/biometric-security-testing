<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Vân tay</title>
    <style>
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --success-color: #28a745;
            --text-dark: #333;
            --border-color: #ddd;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-dark);
            flex-direction: column;
            padding: 2rem 0;
        }
        .main-title {
            font-size: 2.5rem;
            font-weight: 300;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
        }
        #login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 420px;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        input[type="text"] {
            width: calc(100% - 24px);
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        /* Dùng lại style của tab Vân tay */
        .file-upload-label {
            display: block;
            padding: 30px;
            background: #f8f9fa;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            margin: 2rem 0;
            transition: all 0.3s ease;
            color: #555;
        }
        .file-upload-label:hover {
            background: #e9ecef;
            border-color: var(--primary-color);
        }
        #status { font-weight: bold; margin-top: 1.5rem; text-align: center; }
        #train-status { color: var(--success-color); font-weight: bold; text-align: center; margin-top: 0.5rem; }
        .back-link { text-align: center; margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1.5rem; }
        .back-link a { color: var(--primary-color); text-decoration: none; font-weight: 500;}
    </style>
</head>
<body>
    <h1 class="main-title">Đăng ký Sinh trắc học</h1>

    <div id="login-container">
        <h2>Đăng ký Vân tay (Cần 5 ảnh)</h2>
        
        <label for="name" style="font-weight: 500; margin-bottom: 5px; display: block;">Nhập tên:</label>
        <input type="text" id="name" style="width: 100%;" placeholder="Phải TRÙNG với tên đã đăng ký">
        
        <label for="file-input" class="file-upload-label" id="file-label-text">
            Nhấn để chọn 5 ảnh vân tay
        </label>
        <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
        
        <div id="status">Vui lòng chọn 5 ảnh</div>
        <div id="train-status"></div>

        <div class="back-link">
            <a href="/">Quay lại trang Đăng nhập</a>
        </div>
    </div>

    <script>
        // (JavaScript giữ nguyên y hệt)
        const fileInput = document.getElementById('file-input');
        const nameInput = document.getElementById('name');
        const statusDiv = document.getElementById('status');
        const trainStatusDiv = document.getElementById('train-status');
        const fileLabelText = document.getElementById('file-label-text');

        fileInput.addEventListener('change', async (event) => {
            const userName = nameInput.value.trim();
            if (!userName) {
                statusDiv.textContent = "Vui lòng nhập tên!"; 
                fileInput.value = "";
                return;
            }
            const files = event.target.files;
            if (files.length === 0) return;
            
            fileLabelText.textContent = `Đã chọn ${files.length} tệp.`;
            statusDiv.textContent = "Đang tải lên và lưu ảnh...";
            let successCount = 0;
            const filesToUpload = Array.from(files).slice(0, 5);

            for (let i = 0; i < filesToUpload.length; i++) {
                const file = filesToUpload[i];
                const dataUrl = await fileToDataURL(file);
                try {
                    const response = await fetch('/api/register_fingerprint', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: userName,
                            image_data: dataUrl,
                            count: i
                        })
                    });
                    const result = await response.json();
                    if (result.status === "success") {
                        successCount++;
                    }
                } catch (err) {
                    console.error("Lỗi tải ảnh: ", err);
                }
            }
            statusDiv.textContent = `Đã tải lên thành công ${successCount}/${filesToUpload.length} ảnh.`;
            if (successCount > 0) {
                await triggerTraining();
            }
        });
        async function triggerTraining() {
            trainStatusDiv.textContent = "Đang huấn luyện model... Vui lòng chờ...";
            const response = await fetch('/api/trigger_train_fingerprint', { method: 'POST' });
            const result = await response.json();
            if (result.status === "success") {
                trainStatusDiv.textContent = "Huấn luyện vân tay thành công!";
                setTimeout(() => { window.location.href = '/'; }, 2000);
            } else {
                trainStatusDiv.textContent = `Lỗi huấn luyện: ${result.message}`;
            }
        }
        function fileToDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Giọng nói</title>
    <style>
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --danger-color: #dc3545;
            --danger-hover: #c82333;
            --success-color: #28a745;
            --text-dark: #333;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-dark);
            flex-direction: column;
            padding: 2rem 0;
        }
        .main-title {
            font-size: 2.5rem;
            font-weight: 300;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
        }
        #login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 420px;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        input[type="text"] {
            width: calc(100% - 24px);
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, var(--primary-color), var(--primary-hover));
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        /* Nút ghi âm */
        #record.recording {
            background: var(--danger-color);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
        #status { font-weight: bold; margin-top: 1.5rem; text-align: center; }
        #train-status { color: var(--success-color); font-weight: bold; text-align: center; margin-top: 0.5rem; }
        .back-link { text-align: center; margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1.5rem; }
        .back-link a { color: var(--primary-color); text-decoration: none; font-weight: 500;}
    </style>
</head>
<body>
    <h1 class="main-title">Đăng ký Sinh trắc học</h1>

    <div id="login-container">
        <h2>Đăng ký Giọng nói (Cần 5 mẫu)</h2>
        
        <label for="name" style="font-weight: 500; margin-bottom: 5px; display: block;">Nhập tên:</label>
        <input type="text" id="name" style="width: 100%;" placeholder="Phải TRÙNG với tên đã đăng ký">
        
        <p style="text-align: center; margin: 1.5rem 0; line-height: 1.6;">
            Đọc to câu: <br>
            <b style="font-size: 1.1em; color: var(--primary-color);">"Giọng nói của tôi là mật khẩu"</b>
        </p>
        
        <button id="record">Bắt đầu Ghi âm (0/5)</button>
        <div id="status">Vui lòng nhập tên và nhấn nút</div>
        <div id="train-status"></div>

        <div class="back-link">
            <a href="/">Quay lại trang Đăng nhập</a>
        </div>
    </div>

    <script>
        // (JavaScript giữ nguyên y hệt)
        const recordButton = document.getElementById('record');
        const nameInput = document.getElementById('name');
        const statusDiv = document.getElementById('status');
        const trainStatusDiv = document.getElementById('train-status');
        const NUM_SAMPLES = 5;
        let captureCount = 0;
        let mediaRecorder;
        let audioChunks = [];
        recordButton.addEventListener('click', async () => {
            const userName = nameInput.value.trim();
            if (!userName) {
                statusDiv.textContent = "Vui lòng nhập tên!"; return;
            }
            if (captureCount >= NUM_SAMPLES) return;
            if (mediaRecorder && mediaRecorder.state === "recording") {
                return;
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.addEventListener("dataavailable", event => {
                        audioChunks.push(event.data);
                    });
                    mediaRecorder.addEventListener("stop", async () => {
                        recordButton.textContent = `Bắt đầu Ghi âm (${captureCount + 1}/5)`;
                        recordButton.classList.remove('recording');
                        recordButton.disabled = false;
                        statusDiv.textContent = "Đang xử lý & gửi âm thanh...";
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const formData = new FormData();
                        formData.append('name', userName);
                        formData.append('count', captureCount);
                        formData.append('audio_data', audioBlob, 'recording.webm');
                        const response = await fetch('/api/register_voice', {
                            method: 'POST',
                            body: formData
                        });
                        const result = await response.json();
                        if (result.status === "success") {
                            captureCount++;
                            statusDiv.textContent = `Thành công! (${captureCount}/${NUM_SAMPLES})`;
                            recordButton.textContent = `Bắt đầu Ghi âm (${captureCount}/5)`;
                        } else {
                            statusDiv.textContent = `Lỗi: ${result.message}`;
                        }
                        stream.getTracks().forEach(track => track.stop());
                        if (captureCount >= NUM_SAMPLES) {
                            recordButton.textContent = "Đã hoàn tất";
                            recordButton.disabled = true;
                            await triggerTraining();
                        }
                    });
                    mediaRecorder.start();
                    recordButton.textContent = 'Đang ghi... (4 giây)';
                    recordButton.classList.add('recording');
                    recordButton.disabled = true;
                    setTimeout(() => {
                        if (mediaRecorder.state === "recording") {
                            mediaRecorder.stop();
                        }
                    }, 4000);
                } catch (err) {
                    statusDiv.textContent = "Không thể bật micro. Vui lòng cấp quyền.";
                }
            }
        });
        async function triggerTraining() {
            trainStatusDiv.textContent = "Đang huấn luyện model... Vui lòng chờ...";
            const response = await fetch('/api/trigger_train_voice', { method: 'POST' });
            const result = await response.json();
            if (result.status === "success") {
                trainStatusDiv.textContent = "Huấn luyện giọng nói thành công!";
                setTimeout(() => { window.location.href = '/'; }, 2000);
            } else {
                trainStatusDiv.textContent = `Lỗi huấn luyện: ${result.message}`;
            }
        }
    </script>
</body>
</html>
